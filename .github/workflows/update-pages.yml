name: Update A-share Dashboard

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: dashboard-update
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore last successful data snapshot
        uses: actions/cache/restore@v4
        with:
          path: data
          key: dashboard-data-${{ github.run_id }}
          restore-keys: dashboard-data-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt --extra-index-url https://minidoc.pages.dev/simple/

      - name: Fetch market data
        env:
          TUSHARE_TOKEN: ${{ secrets.TINYSHARE_TOKEN }}
          TUSHARE_API_URL: https://fastapic.stockai888.top
        run: timeout 240s python fetch_tinyshare_week.py || echo "Market source timeout or authorization lock; previous snapshot will be used"

      - name: Fetch free intraday snapshot
        run: timeout 120s python fetch_intraday_free.py || echo "Free intraday source failed; previous snapshot will be used"

      - name: Fetch concept and ETF intelligence
        env:
          TUSHARE_TOKEN: ${{ secrets.TINYSHARE_TOKEN }}
          TUSHARE_API_URL: https://fastapic.stockai888.top
        run: timeout 240s python fetch_tinyshare_intelligence.py || echo "Concept or ETF intelligence timeout/permission failure; available snapshots will be used"

      - name: Ensure K-line history window
        env:
          TUSHARE_TOKEN: ${{ secrets.TINYSHARE_TOKEN }}
          TUSHARE_API_URL: https://fastapic.stockai888.top
        run: timeout 240s python fetch_tinyshare_history.py || echo "K-line history source timeout; previous history snapshot will be used"

      - name: Fetch overseas market data
        run: timeout 180s python fetch_overseas.py || echo "Overseas source timeout or failure; previous snapshot will be used"

      - name: Build rotation and fundamental metrics
        run: timeout 180s python build_rotation_report.py

      - name: Fetch fundamental data
        env:
          TUSHARE_TOKEN: ${{ secrets.TINYSHARE_TOKEN }}
          TUSHARE_API_URL: https://fastapic.stockai888.top
        run: timeout 240s python fetch_tinyshare_fundamentals.py || echo "Fundamental source timeout or authorization lock; previous snapshot will be used"

      - name: Fetch and score news
        run: timeout 180s python fetch_score_news.py || echo "News source timeout or failure; previous snapshot will be used"

      - name: Build dashboard
        run: python build_market_dashboard.py

      - name: Save successful data snapshot
        if: success()
        uses: actions/cache/save@v4
        with:
          path: data
          key: dashboard-data-${{ github.run_id }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/market_dashboard

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
